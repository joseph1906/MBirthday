name: curated_celebration
description: "Curated Celebration - a birthday surprise reveal app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  audioplayers: ^6.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/audio/birthday_song.mp3
    - assets/photos/photo1.jpg
    - assets/photos/photo2.jpg
    - assets/photos/photo3.jpg
    - assets/photos/photo4.jpg
    - assets/photos/photo5.jpg
    - assets/photos/photo6.jpg
    - assets/photos/photo7.jpg

# ---- App icon configuration ----
# After running `flutter pub get`, generate the launcher icons with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#fcf9f8"
    theme_color: "#00327d"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

# ---- Splash screen configuration ----
# After running `flutter pub get`, generate the native splash screen with:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#fcf9f8"
  image: assets/icon/icon.png
  android_12:
    color: "#fcf9f8"
    image: assets/icon/icon.png
  android: true
  ios: true
  web: true
  fullscreen: true
